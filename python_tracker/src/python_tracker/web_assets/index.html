<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cesium OpenSky Calibration</title>
    <link
      rel="stylesheet"
      href="https://cesium.com/downloads/cesiumjs/releases/1.125/Build/Cesium/Widgets/widgets.css"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <section class="video-pane">
        <header class="panel-header">
          <h1>Video Overlay</h1>
          <div id="status-line"></div>
        </header>
        <div class="video-toolbar">
          <button id="prev-frame" type="button">Prev</button>
          <input id="frame-slider" type="range" min="0" max="0" value="0" />
          <button id="next-frame" type="button">Next</button>
          <select id="track-select"></select>
          <button id="assign-match" type="button">Assign Match</button>
        </div>
        <div class="video-stage">
          <img id="frame-image" alt="Current video frame" />
          <canvas id="overlay-canvas"></canvas>
        </div>
        <div class="control-grid">
          <label>Reference UTC
            <input id="reference-time" type="text" placeholder="2026-03-28T12:34:56Z" />
          </label>
          <label>Time Offset
            <input id="time-offset" type="number" step="0.5" />
          </label>
          <label>Track Notes
            <input id="match-notes" type="text" />
          </label>
          <label>Overlay Opacity
            <input id="overlay-opacity" type="range" min="0" max="1" step="0.05" />
          </label>
        </div>
        <div class="info-columns">
          <section>
            <h2>Selected Track</h2>
            <div id="selected-track-summary" class="summary-box"></div>
            <div class="table-container"><table id="track-table"></table></div>
          </section>
          <section>
            <h2>Candidates</h2>
            <div class="table-actions">
              <button id="fetch-track" type="button">Fetch Selected Track</button>
            </div>
            <div class="table-container"><table id="candidate-table"></table></div>
          </section>
          <section>
            <h2>OpenSky States</h2>
            <div class="table-actions">
              <button id="fetch-view" type="button">Fetch OpenSky for Current View</button>
            </div>
            <div class="table-container"><table id="states-table"></table></div>
          </section>
        </div>
      </section>
      <section class="map-pane">
        <header class="panel-header">
          <h1>Earth View</h1>
          <div class="button-row">
            <button id="save-camera" type="button">Save camera_config</button>
            <button id="save-matches" type="button">Save manual_matches</button>
            <button id="export-json" type="button">Export with_flight_info</button>
          </div>
        </header>
        <div id="cesium-container"></div>
        <div class="map-overlay">
          <div class="legend">
            <div><strong>Drag marker:</strong> move camera position</div>
            <div><strong>Shift + drag marker:</strong> finer movement</div>
            <div><strong>Alt + drag on globe:</strong> heading / tilt</div>
            <div><strong>Shift + Alt + drag:</strong> roll / FOV</div>
          </div>
          <div class="summary-box" id="camera-summary"></div>
          <div class="summary-box" id="auth-summary"></div>
        </div>
        <div class="table-container cache-table"><table id="cache-table"></table></div>
      </section>
    </div>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.125/Build/Cesium/Cesium.js"></script>
    <script src="/static/app.js" type="module"></script>
  </body>
</html>
